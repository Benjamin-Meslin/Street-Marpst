<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modération — Tags</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
      --border: rgba(255,255,255,0.08); --text: #f0ede8;
      --text-muted: #888; --accent: #E63946;
    }
    body { font-family: 'Caveat', cursive; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 52px;
      border-bottom: 0.5px solid var(--border); background: var(--surface);
    }
    .logo { font-family: 'Permanent Marker', cursive; font-size: 18px; color: var(--accent); }
    .logo span { font-family: 'Caveat', cursive; font-size: 14px; color: var(--text-muted); margin-left: 8px; }

    /* --- Login --- */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 52px); }
    .login-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 36px 40px; text-align: center; width: 340px;
    }
    .login-title { font-family: 'Permanent Marker', cursive; font-size: 24px; color: var(--accent); margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }
    .login-field { text-align: left; margin-bottom: 14px; }
    .login-field label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .login-input {
      width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'Caveat', cursive;
      font-size: 17px; padding: 10px 14px; outline: none; transition: border-color 0.15s;
    }
    .login-input:focus { border-color: rgba(255,255,255,0.25); }
    .login-error { font-size: 13px; color: var(--accent); min-height: 20px; margin-bottom: 10px; text-align: center; }
    .login-btn {
      width: 100%; font-family: 'Permanent Marker', cursive; font-size: 18px;
      padding: 12px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; cursor: pointer; transition: background 0.15s;
    }
    .login-btn:hover { background: #c1121f; }
    .login-btn:disabled { background: rgba(255,255,255,0.1); color: var(--text-muted); cursor: not-allowed; }
    .login-note { font-size: 12px; color: var(--text-muted); margin-top: 16px; line-height: 1.5; opacity: 0.7; }

    /* --- Dashboard --- */
    .dashboard { display: none; }

    /* Onglets */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 0.5px solid var(--border);
      background: var(--surface);
      padding: 0 24px;
    }
    .tab-btn {
      font-family: 'Caveat', cursive; font-size: 15px;
      padding: 12px 20px; background: transparent; border: none;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -0.5px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-btn .badge {
      display: inline-block; font-size: 11px; padding: 1px 7px;
      border-radius: 10px; margin-left: 6px;
      background: rgba(255,255,255,0.08); color: var(--text-muted);
    }
    .tab-btn.active .badge { background: rgba(230,57,70,0.2); color: var(--accent); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Header dashboard */
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px 12px;
    }
    .dash-right { display: flex; align-items: center; gap: 16px; }
    .user-badge {
      font-size: 12px; color: var(--text-muted); background: var(--surface2);
      border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 12px;
    }
    .logout-btn {
      font-family: 'Caveat', cursive; font-size: 14px; padding: 5px 14px;
      border-radius: 6px; border: 0.5px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer;
      transition: color 0.15s;
    }
    .logout-btn:hover { color: var(--text); }

    /* Grilles */
    .tags-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px; padding: 16px 24px;
    }

    .tag-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 10px; overflow: hidden; transition: border-color 0.15s, opacity 0.3s;
    }
    .tag-card.validated { border-color: rgba(76,175,80,0.3); }
    .tag-card.rejected  { opacity: 0.3; pointer-events: none; }
    .tag-card.flagged   { border-color: rgba(230,57,70,0.4); }

    .tag-photo { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--surface2); }
    .tag-photo-placeholder {
      width: 100%; height: 80px; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text-muted);
    }
    .tag-body { padding: 12px 14px; }
    .tag-blaze { font-family: 'Permanent Marker', cursive; font-size: 22px; margin-bottom: 6px; }
    .tag-info { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
    .tag-coords { font-size: 11px; color: var(--text-muted); opacity: 0.5; margin-top: 4px; }

    /* Badge signalements */
    .reports-badge {
      display: inline-block; font-size: 12px; padding: 2px 10px;
      border-radius: 10px; margin-top: 6px;
      background: rgba(230,57,70,0.12); color: var(--accent);
      border: 0.5px solid rgba(230,57,70,0.3);
    }

    /* Motifs de signalement */
    .motif-list { margin-top: 8px; }
    .motif-item {
      font-size: 12px; padding: 4px 8px; margin-bottom: 4px;
      border-radius: 4px; background: rgba(255,255,255,0.04);
      border-left: 2px solid var(--accent);
      color: var(--text-muted);
    }
    .motif-item strong { color: var(--text); }

    .tag-actions {
      display: flex; gap: 8px; padding: 10px 14px;
      border-top: 0.5px solid var(--border);
    }
    .action-btn {
      flex: 1; font-family: 'Caveat', cursive; font-size: 15px;
      padding: 7px; border-radius: 6px;
      border: 0.5px solid var(--border); background: transparent;
      color: var(--text); cursor: pointer; transition: background 0.15s;
      text-align: center; text-decoration: none; display: inline-block;
    }
    .action-btn.validate { background: rgba(76,175,80,0.12); border-color: rgba(76,175,80,0.3); color: #4CAF50; }
    .action-btn.validate:hover { background: rgba(76,175,80,0.22); }
    .action-btn.reject { background: rgba(230,57,70,0.08); border-color: rgba(230,57,70,0.2); color: var(--accent); }
    .action-btn.reject:hover { background: rgba(230,57,70,0.16); }
    .action-btn.restore { background: rgba(255,165,0,0.08); border-color: rgba(255,165,0,0.2); color: orange; }
    .action-btn.restore:hover { background: rgba(255,165,0,0.16); }
    .action-btn.map-link { color: var(--text-muted); font-size: 13px; }
    .action-btn.map-link:hover { background: rgba(255,255,255,0.05); }

    .empty-state {
      grid-column: 1 / -1; padding: 60px 24px;
      text-align: center; color: var(--text-muted); font-size: 16px;
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 12px 24px; font-size: 15px; color: var(--text);
      z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { border-color: rgba(76,175,80,0.4); color: #4CAF50; }
    .toast.error   { border-color: rgba(230,57,70,0.4); color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="logo">TAGS <span>modération</span></div>
  <a href="index.html" style="font-size:14px;color:var(--text-muted);text-decoration:none">← Carte publique</a>
</header>

<!-- Écran de connexion -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-title">Accès modération</div>
    <div class="login-sub">Connecte-toi avec ton email admin.<br>Seuls les comptes autorisés peuvent accéder.</div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" class="login-input" id="input-email" placeholder="toi@exemple.fr"
        onkeydown="if(event.key==='Enter') document.getElementById('input-pwd').focus()"/>
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" class="login-input" id="input-pwd" placeholder="••••••••••"
        onkeydown="if(event.key==='Enter') login()"/>
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-btn" onclick="login()">ENTRER</button>
    <div class="login-note">Authentification gérée par Supabase Auth.<br>Aucun mot de passe dans le code source.</div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">

  <div class="dash-header">
    <div></div>
    <div class="dash-right">
      <span class="user-badge" id="user-badge">—</span>
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <!-- Onglets -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-pending-btn" onclick="switchTab('pending')">
      En attente <span class="badge" id="badge-pending">0</span>
    </button>
    <button class="tab-btn" id="tab-reports-btn" onclick="switchTab('reports')">
      Signalements illicites <span class="badge" id="badge-reports">0</span>
    </button>
    <button class="tab-btn" id="tab-archived-btn" onclick="switchTab('archived')">
      Tags archivés <span class="badge" id="badge-archived">0</span>
    </button>
    <button class="tab-btn" id="tab-validated-btn" onclick="switchTab('validated')">
      Validés <span class="badge" id="badge-validated">0</span>
    </button>
  </div>

  <!-- Onglet : tags en attente de validation initiale -->
  <div class="tab-panel active" id="tab-pending">
    <div class="tags-grid" id="grid-pending">
      <div class="empty-state">Chargement...</div>
    </div>
  </div>

  <!-- Onglet : tags signalés illicites (masqués automatiquement) -->
  <div class="tab-panel" id="tab-reports">
    <div class="tags-grid" id="grid-reports">
      <div class="empty-state">Chargement...</div>
    </div>
  </div>

  <!-- Onglet : tags archivés (signalés disparus) -->
  <div class="tab-panel" id="tab-archived">
    <div class="tags-grid" id="grid-archived">
      <div class="empty-state">Chargement...</div>
    </div>
  </div>

  <!-- Onglet : tags validés (pour audit) -->
  <div class="tab-panel" id="tab-validated">
    <div class="tags-grid" id="grid-validated">
      <div class="empty-state">Chargement...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

// --- Init : vérifier la session existante ---
async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session) showDashboard(session.user);
}

// --- Connexion ---
async function login() {
  const email = document.getElementById('input-email').value.trim();
  const pwd   = document.getElementById('input-pwd').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');

  if (!email || !pwd) { err.textContent = 'Remplis les deux champs.'; return; }

  btn.disabled = true;
  btn.textContent = 'Connexion...';
  err.textContent = '';

  const { data, error } = await db.auth.signInWithPassword({ email, password: pwd });

  if (error) {
    err.textContent = 'Email ou mot de passe incorrect.';
    btn.disabled = false;
    btn.textContent = 'ENTRER';
    return;
  }
  showDashboard(data.user);
}

function showDashboard(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('user-badge').textContent = user.email;
  loadAll();
}

async function logout() {
  await db.auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('input-pwd').value = '';
}

// --- Onglets ---
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name + '-btn').classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// --- Charger toutes les données ---
async function loadAll() {
  await Promise.all([loadPending(), loadReported(), loadArchived(), loadValidated()]);
}

// Tags en attente de validation initiale
async function loadPending() {
  const { data } = await db.from('tags').select('*')
    .eq('validated', false).eq('hidden', false)
    .order('created_at', { ascending: false });
  const tags = data || [];
  document.getElementById('badge-pending').textContent = tags.length;
  renderGrid('grid-pending', tags, 'pending');
}

// Tags signalés illicites (masqués par trigger)
async function loadReported() {
  const { data: hiddenTags } = await db.from('tags').select('*')
    .eq('hidden', true).order('reports_count', { ascending: false });
  const tags = hiddenTags || [];
  for (const tag of tags) {
    const { data: sigs } = await db.from('signalements')
      .select('motif, detail, created_at')
      .eq('tag_id', tag.id).eq('type_signal', 'illicite')
      .order('created_at', { ascending: false });
    tag._signalements = sigs || [];
  }
  document.getElementById('badge-reports').textContent = tags.length;
  renderGrid('grid-reports', tags, 'reported');
}

// Tags archivés (signalés disparus ≥ 5)
async function loadArchived() {
  const { data } = await db.from('tags').select('*')
    .eq('archived', true).eq('hidden', false)
    .order('disparus_count', { ascending: false });
  const tags = data || [];
  for (const tag of tags) {
    const { data: sigs } = await db.from('signalements')
      .select('motif, detail, created_at')
      .eq('tag_id', tag.id).eq('type_signal', 'disparu')
      .order('created_at', { ascending: false });
    tag._signalements = sigs || [];
  }
  document.getElementById('badge-archived').textContent = tags.length;
  renderGrid('grid-archived', tags, 'archived');
}

// Tags validés actifs (pour audit)
async function loadValidated() {
  const { data, count } = await db.from('tags').select('*', { count: 'exact' })
    .eq('validated', true).eq('hidden', false).eq('archived', false)
    .order('created_at', { ascending: false }).limit(50);
  const tags = data || [];
  document.getElementById('badge-validated').textContent = count || 0;
  renderGrid('grid-validated', tags, 'validated');
}

// --- Rendu des cartes ---
const MOTIF_LABELS = {
  contenu_illicite: 'Contenu illicite',
  vie_privee:       'Vie privée',
  haine:            'Propos haineux',
  autre:            'Autre motif',
  disparu_efface:   'Effacé / recouvert',
  disparu_degrade:  'Très dégradé',
  disparu_demolit:  'Mur démoli',
  disparu_autre:    'Autre raison',
};

const STYLE_LABELS = {
  'tag simple':    'Tag simple',
  'throw-up':      'Throw-up',
  'wildstyle':     'Wildstyle',
  'bubble letters':'Bubble letters',
  'block letters': 'Block letters',
  'fill-in':       'Fill-in',
  'piece':         'Piece',
  'bombing':       'Bombing',
  'sticker':       'Sticker / Slap',
  'calligraphie':  'Calligraphie',
  'autre':         'Autre',
};

function renderGrid(gridId, tags, type) {
  const grid = document.getElementById(gridId);
  if (tags.length === 0) {
    grid.innerHTML = '<div class="empty-state">Aucun élément</div>';
    return;
  }

  grid.innerHTML = tags.map(tag => {
    const photo = tag.photo_url
      ? `<img class="tag-photo" src="${tag.photo_url}" alt="Tag ${tag.blaze}" loading="lazy"/>`
      : `<div class="tag-photo-placeholder">pas de photo</div>`;

    const illicitesBadge = tag.reports_count > 0
      ? `<div class="reports-badge">⚑ ${tag.reports_count} signalement${tag.reports_count > 1 ? 's' : ''} illicite${tag.reports_count > 1 ? 's' : ''}</div>`
      : '';

    const disparusBadge = tag.disparus_count > 0
      ? `<div class="reports-badge" style="background:rgba(150,150,150,0.1);border-color:rgba(150,150,150,0.3);color:#aaa">👻 ${tag.disparus_count} signalement${tag.disparus_count > 1 ? 's' : ''} disparu</div>`
      : '';

    const motifsList = (tag._signalements || []).length > 0
      ? `<div class="motif-list">` +
        tag._signalements.map(s =>
          `<div class="motif-item">
            <strong>${MOTIF_LABELS[s.motif] || s.motif}</strong>
            ${s.detail ? ` — ${s.detail}` : ''}
          </div>`
        ).join('') + `</div>`
      : '';

    let actions = '';
    if (type === 'pending') {
      actions = `
        <button class="action-btn validate" onclick="validateTag('${tag.id}')">✓ Valider</button>
        <button class="action-btn reject"   onclick="deleteTag('${tag.id}')">✕ Supprimer</button>
        <a class="action-btn map-link" href="https://www.openstreetmap.org/?mlat=${tag.latitude}&mlon=${tag.longitude}#map=17/${tag.latitude}/${tag.longitude}" target="_blank" rel="noopener">⌖ Voir</a>`;
    } else if (type === 'reported') {
      actions = `
        <button class="action-btn restore" onclick="restoreTag('${tag.id}', 'illicite')">↩ Restaurer</button>
        <button class="action-btn reject"  onclick="deleteTag('${tag.id}')">✕ Supprimer</button>
        <a class="action-btn map-link" href="https://www.openstreetmap.org/?mlat=${tag.latitude}&mlon=${tag.longitude}#map=17/${tag.latitude}/${tag.longitude}" target="_blank" rel="noopener">⌖ Voir</a>`;
    } else if (type === 'archived') {
      actions = `
        <button class="action-btn restore" onclick="restoreTag('${tag.id}', 'disparu')" title="Remettre en ligne — le tag existe encore">↩ Toujours là</button>
        <button class="action-btn reject"  onclick="deleteTag('${tag.id}')">✕ Supprimer</button>
        <a class="action-btn map-link" href="https://www.openstreetmap.org/?mlat=${tag.latitude}&mlon=${tag.longitude}#map=17/${tag.latitude}/${tag.longitude}" target="_blank" rel="noopener">⌖ Voir</a>`;
    } else {
      actions = `
        <button class="action-btn reject"   onclick="deleteTag('${tag.id}')">✕ Supprimer</button>
        <a class="action-btn map-link" href="https://www.openstreetmap.org/?mlat=${tag.latitude}&mlon=${tag.longitude}#map=17/${tag.latitude}/${tag.longitude}" target="_blank" rel="noopener">⌖ Voir</a>`;
    }

    const isArchived = type === 'archived';
    return `
      <div class="tag-card ${type === 'reported' ? 'flagged' : ''}" id="card-${tag.id}"
        style="${isArchived ? 'opacity:0.7' : ''}">
        ${photo}
        <div class="tag-body">
          <div class="tag-blaze" style="color:${isArchived ? '#666' : tag.couleur};${isArchived ? 'text-decoration:line-through' : ''}">${tag.blaze}</div>
          <div class="tag-info">
            ${tag.style   ? `Style : ${tag.style}<br>`   : ''}
            ${tag.support ? `Support : ${tag.support}<br>` : ''}
            ${tag.date_vue ? `Vu le : ${new Date(tag.date_vue).toLocaleDateString('fr-FR')}<br>` : ''}
            Soumis le : ${new Date(tag.created_at).toLocaleDateString('fr-FR')}
          </div>
          ${illicitesBadge}${disparusBadge}
          ${motifsList}
          <div class="tag-coords">${tag.latitude.toFixed(5)}, ${tag.longitude.toFixed(5)}</div>
        </div>
        <div class="tag-actions">${actions}</div>
      </div>`;
  }).join('');
}

// --- Actions ---
async function validateTag(id) {
  const { error } = await db.from('tags').update({ validated: true }).eq('id', id);
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  removeCard(id);
  showToast('Tag publié sur la carte', 'success');
  loadAll();
}

async function restoreTag(id, type) {
  const updates = type === 'disparu'
    ? { archived: false, disparus_count: 0 }
    : { hidden: false, reports_count: 0 };

  const { error } = await db.from('tags').update(updates).eq('id', id);
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }

  // Supprimer les signalements du type correspondant
  await db.from('signalements')
    .delete().eq('tag_id', id).eq('type_signal', type);

  removeCard(id);
  showToast(
    type === 'disparu'
      ? 'Tag remis en ligne — compteur réinitialisé'
      : 'Tag restauré et republié',
    'success'
  );
  loadAll();
}

async function deleteTag(id) {
  // La suppression en cascade supprime aussi les signalements liés (ON DELETE CASCADE)
  const { error } = await db.from('tags').delete().eq('id', id);
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  removeCard(id);
  showToast('Tag supprimé définitivement');
  loadAll();
}

function removeCard(id) {
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('rejected'); setTimeout(() => card.remove(), 400); }
}

// --- Toast ---
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
